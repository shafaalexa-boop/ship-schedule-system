<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Digital Clock - Monitor waktu di berbagai time zone dengan antarmuka yang elegan">
    <meta name="theme-color" content="#2a5298">
    <title>Digital Clock - Multi Timezone</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-/slR4lqWfRIl2zHc8Q/M2bj3UKqpXVphCxHdFpaPAGTx5mxpNvZ1JGFXkNP8eIIbRm6vZA3fJqvBQfTvdYiYLw==" crossorigin="anonymous" referrerpolicy="no-referrer">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="header-content">
                <div class="logo-section">
                    <i class="fas fa-clock" aria-hidden="true"></i>
                    <div>
                        <h1>Digital Clock</h1>
                        <p>Monitor Waktu di Berbagai Time Zone</p>
                    </div>
                </div>
                <div class="header-actions">
                    <button id="darkModeBtn" class="btn-icon" title="Toggle Dark Mode" aria-label="Toggle Dark Mode">
                        <i class="fas fa-moon" aria-hidden="true"></i>
                    </button>
                </div>
            </div>
        </header>

        <section class="controls-section">
            <div class="controls">
                <input type="text" id="searchTimezone" placeholder="🔍 Cari Timezone..." class="search-input" aria-label="Search timezones">
                <button id="addTimezoneBtn" class="btn-primary" aria-label="Add new timezone">
                    <i class="fas fa-plus" aria-hidden="true"></i> Tambah Timezone
                </button>
            </div>
        </section>

        <section class="clocks-container" id="clocksContainer" aria-live="polite" aria-label="Timezone clocks"></section>

        <div id="addTimezoneModal" class="modal" role="dialog" aria-labelledby="modalTitle">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 id="modalTitle">Tambah Timezone</h2>
                    <button class="modal-close" aria-label="Close modal">&times;</button>
                </div>
                <div class="modal-body">
                    <input type="text" id="timezoneSearch" placeholder="Cari timezone..." class="search-input" aria-label="Search for timezone to add" style="margin-bottom: 15px;">
                    <div id="timezoneList" class="timezone-list" role="listbox"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast" role="status" aria-live="assertive" aria-atomic="true"></div>

    <script src="timezones.js" defer></script>
    <script src="app.js" defer></script>
</body>
</html>
